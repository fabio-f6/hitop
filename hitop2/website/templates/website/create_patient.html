{% extends 'base.html' %}
{% block content %}

<div class="col-md-6 offset-md-3">

<h2>Criar novo paciente</h2>
<br>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <br>

    <button type="submit" class="btn btn-sm rounded-0"
   style="background-color: #e2f0ff; color: #000; 
          border: 1px solid #9ec9ff; padding: 0.5rem 1rem;">
        Criar paciente
    </button>

</form>

</div>

{% endblock %}
