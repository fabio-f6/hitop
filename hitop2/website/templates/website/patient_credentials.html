{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

    <div style="background-color: #e2f0ff; padding: 20px; border: 1px solid #9ec9ff;">
        <h4>Credenciais do Paciente</h4>
        <p>Estas credenciais só serão mostradas uma vez. Por favor, guarde-as em segurança.</p>
    </div>

    <br>

    <div class="mb-3">
        <label><b>Username</b></label>
        <input type="text" class="form-control" value="{{ credentials.username }}" readonly>
    </div>

    <div class="mb-3">
        <label><b>Password</b></label>
        <input type="text" class="form-control" value="{{ credentials.password }}" readonly>
    </div>

    <button class="btn btn-secondary rounded-0" onclick="copyCredentials()">
        Copiar credenciais
    </button>

    <a href="{% url 'website:my_patients' %}" class="btn btn-primary rounded-0" style="background-color: #e2f0ff; color: #000; border: 1px solid #9ec9ff;">
        Continuar
    </a>

</div>

<script>
function copyCredentials() {
    const text = `Username: {{ credentials.username }}\nPassword: {{ credentials.password }}`;
    navigator.clipboard.writeText(text);
    alert("Credenciais copiadas!");
}
</script>

{% endblock %}
